<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário!</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            min-height:100vh;padding:20px;
            font-family:'Nunito',sans-serif;text-align:center;
            background:linear-gradient(135deg,#fce4f3 0%,#e8d5f5 30%,#d5e8f5 60%,#e8f5d5 100%);
            background-attachment:fixed;overflow-x:hidden;position:relative;
        }

        body::before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:radial-gradient(ellipse at 10% 20%,rgba(255,182,213,0.3) 0%,transparent 50%),
                        radial-gradient(ellipse at 90% 80%,rgba(200,160,255,0.3) 0%,transparent 50%),
                        radial-gradient(ellipse at 50% 50%,rgba(160,255,180,0.15) 0%,transparent 60%);
            pointer-events:none;z-index:0;
        }

        .borboleta{position:fixed;font-size:2rem;pointer-events:none;z-index:1;animation:voar linear infinite;opacity:0.7;filter:drop-shadow(0 0 6px rgba(255,150,200,0.6));}
        .borboleta:nth-child(1){left:5%;font-size:1.8rem;animation-duration:18s;color:#d63384;}
        .borboleta:nth-child(2){left:20%;font-size:2.2rem;animation-duration:22s;animation-delay:3s;color:#9b59b6;}
        .borboleta:nth-child(3){left:40%;font-size:1.5rem;animation-duration:16s;animation-delay:6s;color:#e056a0;}
        .borboleta:nth-child(4){left:60%;font-size:2rem;animation-duration:20s;animation-delay:2s;color:#8e44ad;}
        .borboleta:nth-child(5){left:80%;font-size:1.7rem;animation-duration:24s;animation-delay:5s;color:#c870d4;}
        .borboleta:nth-child(6){left:90%;font-size:2.4rem;animation-duration:19s;animation-delay:8s;color:#d63384;}
        .borboleta:nth-child(7){left:35%;font-size:1.3rem;animation-duration:21s;animation-delay:10s;color:#a855f7;}
        .borboleta:nth-child(8){left:70%;font-size:1.9rem;animation-duration:17s;animation-delay:4s;color:#ec4899;}

        @keyframes voar{
            0%{top:-10%;transform:translateX(0) rotate(0deg) scale(1);}
            25%{transform:translateX(30px) rotate(10deg) scale(1.1);}
            50%{transform:translateX(-20px) rotate(-5deg) scale(0.95);}
            75%{transform:translateX(15px) rotate(8deg) scale(1.05);}
            100%{top:110%;transform:translateX(0) rotate(0deg) scale(1);}
        }

        .petalos{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
        .petalo{position:absolute;width:12px;height:12px;background:radial-gradient(ellipse,#f9a8d4,transparent);border-radius:50% 0 50% 0;opacity:0.5;animation:cair linear infinite;}
        .petalo:nth-child(1){left:10%;animation-duration:12s;width:10px;height:10px;}
        .petalo:nth-child(2){left:25%;animation-duration:15s;animation-delay:2s;width:14px;height:14px;}
        .petalo:nth-child(3){left:45%;animation-duration:11s;animation-delay:5s;width:8px;height:8px;}
        .petalo:nth-child(4){left:65%;animation-duration:14s;animation-delay:1s;width:12px;height:12px;}
        .petalo:nth-child(5){left:85%;animation-duration:13s;animation-delay:4s;width:10px;height:10px;}
        .petalo:nth-child(6){left:15%;animation-duration:16s;animation-delay:7s;width:9px;height:9px;}
        .petalo:nth-child(7){left:55%;animation-duration:10s;animation-delay:3s;width:11px;height:11px;}
        .petalo:nth-child(8){left:75%;animation-duration:14s;animation-delay:6s;width:13px;height:13px;}

        @keyframes cair{
            0%{top:-5%;transform:rotate(0deg) translateX(0);opacity:0;}
            10%{opacity:0.5;}
            90%{opacity:0.5;}
            100%{top:105%;transform:rotate(720deg) translateX(80px);opacity:0;}
        }

        .conteudo{position:relative;z-index:2;}

        h1{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:#9b3380;text-shadow:0 2px 10px rgba(200,100,180,0.3);margin-bottom:2px;letter-spacing:1px;}
        .subtitulo{font-family:'Nunito',sans-serif;font-size:1.05rem;color:#a855a0;margin-bottom:20px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}

        .camera-area{position:relative;width:360px;height:640px;margin:0 auto;border-radius:24px;overflow:hidden;box-shadow:0 0 30px rgba(200,100,200,0.3),0 0 60px rgba(180,80,220,0.15),0 10px 40px rgba(0,0,0,0.1);border:3px solid rgba(255,255,255,0.6);}
        .camera-area::before{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;background:linear-gradient(45deg,#f472b6,#c084fc,#86efac,#f472b6,#c084fc);border-radius:26px;z-index:-1;animation:bordaBrilhar 4s ease-in-out infinite;}
        @keyframes bordaBrilhar{0%,100%{opacity:0.6;}50%{opacity:1;}}

        #camera{width:100%;height:100%;object-fit:cover;display:block;}

        .moldura-overlay{
            position:absolute;top:0;left:0;width:100%;height:100%;
            pointer-events:none;z-index:10;
            display:flex;flex-direction:column;justify-content:space-between;
            padding:20px;
        }

        .moldura-topo{
            text-align:center;
            background:linear-gradient(180deg,rgba(255,255,255,0.85) 0%,rgba(255,255,255,0.4) 70%,transparent 100%);
            border-radius:0 0 20px 20px;
            padding:18px 15px 22px;
        }

        .moldura-topo .flores{font-size:1.1rem;letter-spacing:6px;margin-bottom:2px;}
        .moldura-topo .nome{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:#9b3380;line-height:1.1;}
        .moldura-topo .texto{font-family:'Nunito',sans-serif;font-size:0.75rem;color:#a855a0;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-top:3px;}

        .moldura-base{
            text-align:center;
            background:linear-gradient(0deg,rgba(255,255,255,0.85) 0%,rgba(255,255,255,0.4) 70%,transparent 100%);
            border-radius:20px 20px 0 0;
            padding:22px 15px 16px;
        }

        .moldura-base .data{font-family:'Nunito',sans-serif;font-size:0.8rem;color:#a855a0;font-weight:600;letter-spacing:1px;}
        .moldura-base .flores{font-size:1.1rem;letter-spacing:6px;margin-top:2px;}

        .moldura-lado-esq,.moldura-lado-dir{
            position:absolute;top:50%;transform:translateY(-50%);
            writing-mode:vertical-rl;
            font-family:'Nunito',sans-serif;font-size:0.65rem;
            color:rgba(168,85,160,0.5);letter-spacing:4px;text-transform:uppercase;
            font-weight:600;
        }
        .moldura-lado-esq{left:8px;}
        .moldura-lado-dir{right:8px;transform:translateY(-50%) rotate(180deg);}

        #molduraImg{display:none;}

        #tirarFoto{margin-top:25px;padding:16px 40px;border:none;border-radius:50px;cursor:pointer;font-size:18px;font-family:'Nunito',sans-serif;font-weight:700;background:linear-gradient(135deg,#ec4899,#a855f7);color:white;box-shadow:0 4px 20px rgba(200,80,180,0.4);transition:all 0.3s ease;}
        #tirarFoto:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(200,80,180,0.5);background:linear-gradient(135deg,#db2777,#9333ea);}
        #tirarFoto:active{transform:translateY(0);}

        .botoes-acoes{margin-top:20px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
        .botoes-acoes.escondido{display:none;}

        .btn-acao{padding:14px 24px;border:none;border-radius:50px;cursor:pointer;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;color:white;transition:all 0.3s ease;box-shadow:0 3px 15px rgba(0,0,0,0.15);}
        .btn-acao:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,0,0,0.2);}
        .btn-acao:active{transform:translateY(0);}

        .btn-baixar{background:linear-gradient(135deg,#22c55e,#16a34a);}
        .btn-whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);}
        .btn-compartilhar{background:linear-gradient(135deg,#a855f7,#7c3aed);}
        .btn-nova{background:linear-gradient(135deg,#f472b6,#ec4899);}

        canvas{display:none;}

        .flor-esq,.flor-dir{position:fixed;font-size:3rem;pointer-events:none;z-index:1;opacity:0.4;}
        .flor-esq{bottom:10px;left:10px;}
        .flor-dir{bottom:10px;right:10px;}

        .status-bar{margin:15px auto;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;max-width:360px;}
        .status-bar.sucesso{background:linear-gradient(135deg,#d4edda,#c3e6cb);color:#155724;border:1px solid #28a745;}
        .status-bar.erro{background:linear-gradient(135deg,#f8d7da,#f5c6cb);color:#721c24;border:1px solid #dc3545;}
        .status-bar.processando{background:linear-gradient(135deg,#d1ecf1,#bee5eb);color:#0c5460;border:1px solid #17a2b8;}
        .status-bar.aviso{background:linear-gradient(135deg,#fff3cd,#ffeeba);color:#856404;border:1px solid #ffc107;}

        .upload-progress{margin:10px auto;max-width:360px;display:none;}
        .upload-progress.ativo{display:block;}
        .barra-progresso{width:100%;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;}
        .barra-progresso-fill{height:100%;width:0%;background:linear-gradient(90deg,#ec4899,#a855f7);transition:width 0.3s ease;border-radius:4px;}
        .upload-progress p{font-size:13px;color:#666;margin-top:5px;}

        .galeria-section{margin-top:30px;max-width:800px;margin-left:auto;margin-right:auto;}
        .galeria-section h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#9b3380;margin-bottom:15px;}
        .galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
        .galeria-item{border-radius:12px;overflow:hidden;box-shadow:0 3px 15px rgba(0,0,0,0.1);transition:transform 0.3s ease;}
        .galeria-item:hover{transform:scale(1.03);}
        .galeria-item img{width:100%;height:150px;object-fit:cover;}
        .galeria-item .info{padding:8px;font-size:11px;color:#666;background:white;text-align:left;}
        .galeria-item .status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:white;margin-top:4px;}
        .status-sync{background:#28a745;}
        .status-erro{background:#dc3545;}

        @media(max-width:400px){h1{font-size:2rem;}.camera-area{width:300px;height:530px;}}
    </style>
</head>
<body>

<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>
<div class="borboleta">🦋</div>

<div class="petalos">
    <div class="petalo"></div><div class="petalo"></div><div class="petalo"></div><div class="petalo"></div>
    <div class="petalo"></div><div class="petalo"></div><div class="petalo"></div><div class="petalo"></div>
</div>

<div class="flor-esq">🌸</div>
<div class="flor-dir">🌺</div>

<div class="conteudo">
    <h1>Feliz Aniversario!</h1>
    <p class="subtitulo">Jardim Encantado</p>

    <div id="statusMsg" class="status-bar sucesso">
        Pronto! Tira uma foto e ela vai direto pro Drive
    </div>

    <div class="camera-area">
        <video id="camera" autoplay playsinline></video>

        <div class="moldura-overlay" id="molduraOverlay">
            <div class="moldura-topo">
                <div class="flores">🌸🦋🌸</div>
                <div class="nome">Sarah</div>
                <div class="texto">1 Aninho</div>
            </div>
            <div class="moldura-lado-esq">Jardim Encantado</div>
            <div class="moldura-lado-dir">Jardim Encantado</div>
            <div class="moldura-base">
                <div class="data">2025</div>
                <div class="flores">🦋🌸🦋</div>
            </div>
        </div>

        <img id="molduraImg" src="./assets/moldura.png">
    </div>

    <button id="tirarFoto">Tirar Foto</button>

    <div class="upload-progress" id="uploadProgress">
        <div class="barra-progresso">
            <div class="barra-progresso-fill" id="progressFill"></div>
        </div>
        <p id="progressText">Preparando foto...</p>
    </div>

    <div id="botoesAcoes" class="botoes-acoes escondido">
        <button id="btnBaixar" class="btn-acao btn-baixar">Baixar Foto</button>
        <button id="btnWhatsApp" class="btn-acao btn-whatsapp">WhatsApp</button>
        <button id="btnCompartilhar" class="btn-acao btn-compartilhar">Compartilhar</button>
        <button id="btnNovaFoto" class="btn-acao btn-nova">Nova Foto</button>
    </div>

    <div class="galeria-section" id="galeriaSection" style="display:none;">
        <h2>Fotos Salvas</h2>
        <div class="galeria-grid" id="galeriaGrid"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    // ============================================
    // CONFIGURACAO
    // ============================================
    const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbw7dAISw4iz5N_y64zELssyuukbv3vRaWmohwM3VdyZaOSLcODZ-rR4p9ntuuciyHX9Zw/exec";
    // ============================================

    const video = document.getElementById("camera");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const btn = document.getElementById("tirarFoto");
    const botoesAcoes = document.getElementById("botoesAcoes");
    const btnBaixar = document.getElementById("btnBaixar");
    const btnWhatsApp = document.getElementById("btnWhatsApp");
    const btnCompartilhar = document.getElementById("btnCompartilhar");
    const btnNovaFoto = document.getElementById("btnNovaFoto");
    const uploadProgress = document.getElementById("uploadProgress");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const galeriaSection = document.getElementById("galeriaSection");
    const galeriaGrid = document.getElementById("galeriaGrid");
    const statusMsg = document.getElementById("statusMsg");
    const molduraOverlay = document.getElementById("molduraOverlay");

    let imagemAtual = null;

    // ============================================
    // METADADOS
    // ============================================
    function obterMetadados() {
        const dados = localStorage.getItem("fotos_metadados");
        return dados ? JSON.parse(dados) : [];
    }

    function salvarMetadados(metadados) {
        localStorage.setItem("fotos_metadados", JSON.stringify(metadados));
    }

    function registrarFoto(metadata) {
        const metadados = obterMetadados();
        metadados.unshift(metadata);
        salvarMetadados(metadados);
        atualizarGaleria();
    }

    function atualizarGaleria() {
        const metadados = obterMetadados();
        if (metadados.length === 0) {
            galeriaSection.style.display = "none";
            return;
        }

        galeriaSection.style.display = "block";
        galeriaGrid.innerHTML = "";

        metadados.slice(0, 12).forEach(meta => {
            const item = document.createElement("div");
            item.className = "galeria-item";

            const statusClasse = meta.status === "sync" ? "status-sync" : "status-erro";
            const statusTexto = meta.status === "sync" ? "Salvo" : "Erro";

            const dataFormatada = new Date(meta.dataEnvio).toLocaleDateString("pt-BR", {
                day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
            });

            item.innerHTML = `
                <img src="${meta.dataUrl}" alt="Foto">
                <div class="info">
                    <div>${meta.nomeArquivo}</div>
                    <div>${dataFormatada}</div>
                    <span class="status-badge ${statusClasse}">${statusTexto}</span>
                </div>
            `;

            if (meta.driveLink) {
                item.style.cursor = "pointer";
                item.onclick = () => window.open(meta.driveLink, "_blank");
            }

            galeriaGrid.appendChild(item);
        });
    }

    // ============================================
    // CAMERA
    // ============================================
    async function iniciarCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 1280 } }
            });
            video.srcObject = stream;
        } catch (erro) {
            alert("Nao foi possivel acessar a camera.");
            console.log(erro);
        }
    }

    // ============================================
    // CAPTURAR FOTO (crop inteligente sem distorcao)
    // ============================================
    function capturarFoto() {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const cw = 1080;
        const ch = 1920;

        canvas.width = cw;
        canvas.height = ch;

        const videoAspect = vw / vh;
        const canvasAspect = cw / ch;

        let sx, sy, sw, sh;

        if (videoAspect > canvasAspect) {
            sh = vh;
            sw = vh * canvasAspect;
            sx = (vw - sw) / 2;
            sy = 0;
        } else {
            sw = vw;
            sh = vw / canvasAspect;
            sx = 0;
            sy = (vh - sh) / 2;
        }

        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);

        desenharMolduraCanvas(cw, ch);

        imagemAtual = canvas.toDataURL("image/png", 0.92);

        botoesAcoes.classList.remove("escondido");
        btn.style.display = "none";

        enviarParaDrive();
    }

    function desenharMolduraCanvas(w, h) {
        const overlay = molduraOverlay;
        const ratioX = w / 360;
        const ratioY = h / 640;

        ctx.save();

        const gradTop = ctx.createLinearGradient(0, 0, 0, h * 0.15);
        gradTop.addColorStop(0, "rgba(255,255,255,0.9)");
        gradTop.addColorStop(0.6, "rgba(255,255,255,0.5)");
        gradTop.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradTop;
        ctx.fillRect(0, 0, w, h * 0.15);

        const gradBot = ctx.createLinearGradient(0, h, 0, h * 0.85);
        gradBot.addColorStop(0, "rgba(255,255,255,0.9)");
        gradBot.addColorStop(0.6, "rgba(255,255,255,0.5)");
        gradBot.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradBot;
        ctx.fillRect(0, h * 0.85, w, h * 0.15);

        ctx.textAlign = "center";

        ctx.font = `${Math.round(18 * ratioX)}px serif`;
        ctx.fillStyle = "rgba(155,51,128,0.8)";
        ctx.fillText("🌸🦋🌸", w / 2, h * 0.06);

        ctx.font = `bold ${Math.round(52 * ratioX)}px 'Cormorant Garamond', serif`;
        ctx.fillStyle = "#9b3380";
        ctx.fillText("Sarah", w / 2, h * 0.10);

        ctx.font = `600 ${Math.round(20 * ratioX)}px 'Nunito', sans-serif`;
        ctx.fillStyle = "#a855a0";
        ctx.fillText("1 Aninho", w / 2, h * 0.13);

        ctx.font = `600 ${Math.round(18 * ratioX)}px 'Nunito', sans-serif`;
        ctx.fillStyle = "rgba(168,85,160,0.6)";
        ctx.fillText("2025", w / 2, h * 0.92);

        ctx.font = `${Math.round(18 * ratioX)}px serif`;
        ctx.fillStyle = "rgba(155,51,128,0.8)";
        ctx.fillText("🦋🌸🦋", w / 2, h * 0.96);

        ctx.restore();
    }

    // ============================================
    // ENVIAR PARA DRIVE
    // ============================================
    async function enviarParaDrive() {
        if (!imagemAtual) return;

        if (!APPSCRIPT_URL || APPSCRIPT_URL === "cole-sua-url-aqui") {
            statusMsg.className = "status-bar aviso";
            statusMsg.textContent = "Configure o APPSCRIPT_URL";
            statusMsg.style.display = "block";
            return;
        }

        uploadProgress.classList.add("ativo");
        progressFill.style.width = "10%";
        progressText.textContent = "Foto capturada! Enviando para o Drive...";

        try {
            const dataHora = new Date().toISOString().replace(/[:.]/g, "-");
            const nomeArquivo = `foto-aniversario-${dataHora}.png`;

            progressFill.style.width = "30%";
            progressText.textContent = "Salvando no Google Drive...";

            const response = await fetch(APPSCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ imagem: imagemAtual, nome: nomeArquivo }),
                headers: { "Content-Type": "text/plain" }
            });

            progressFill.style.width = "70%";
            const resultado = await response.json();
            progressFill.style.width = "100%";

            if (resultado.status === "ok") {
                registrarFoto({
                    id: Date.now().toString(),
                    nomeArquivo: nomeArquivo,
                    driveFileId: resultado.id,
                    driveLink: resultado.link,
                    dataEnvio: new Date().toISOString(),
                    status: "sync",
                    dataUrl: imagemAtual
                });

                progressText.textContent = "Foto salva no Drive!";
                statusMsg.className = "status-bar sucesso";
                statusMsg.textContent = `Foto salva! ${resultado.link}`;
                statusMsg.style.display = "block";
            } else {
                throw new Error(resultado.mensagem || "Erro ao salvar");
            }

            setTimeout(() => { uploadProgress.classList.remove("ativo"); progressFill.style.width = "0%"; }, 3000);

        } catch (erro) {
            console.error("Erro ao enviar:", erro);
            progressFill.style.width = "0%";
            progressText.textContent = `Erro: ${erro.message}`;

            statusMsg.className = "status-bar erro";
            statusMsg.textContent = `Erro: ${erro.message}`;
            statusMsg.style.display = "block";

            registrarFoto({
                id: Date.now().toString(), nomeArquivo: `foto-erro-${Date.now()}.png`,
                driveFileId: null, driveLink: null, dataEnvio: new Date().toISOString(),
                status: "erro", dataUrl: imagemAtual, erro: erro.message
            });

            setTimeout(() => { uploadProgress.classList.remove("ativo"); }, 4000);
        }
    }

    // ============================================
    // COMPARTILHAMENTO
    // ============================================
    async function compartilharWhatsApp() {
        if (!imagemAtual) return;
        try {
            const response = await fetch(imagemAtual);
            const blob = await response.blob();
            const arquivo = new File([blob], "foto-aniversario.png", { type: "image/png" });
            if (navigator.canShare && navigator.canShare({ files: [arquivo] })) {
                await navigator.share({ files: [arquivo], title: "Foto do Aniversario", text: "Confira minha foto!" });
            } else { baixarFoto(); alert("Foto baixada! Envie pelo WhatsApp."); }
        } catch (erro) { if (erro.name !== "AbortError") { baixarFoto(); alert("Foto baixada! Envie pelo WhatsApp."); } }
    }

    async function compartilharOutros() {
        if (!imagemAtual) return;
        try {
            const response = await fetch(imagemAtual);
            const blob = await response.blob();
            const arquivo = new File([blob], "foto-aniversario.png", { type: "image/png" });
            if (navigator.canShare && navigator.canShare({ files: [arquivo] })) {
                await navigator.share({ files: [arquivo], title: "Foto do Aniversario", text: "Confira minha foto!" });
            } else { baixarFoto(); alert("Foto baixada!"); }
        } catch (erro) { if (erro.name !== "AbortError") { baixarFoto(); alert("Foto baixada!"); } }
    }

    function baixarFoto() {
        if (!imagemAtual) return;
        const link = document.createElement("a");
        link.download = "foto-aniversario.png";
        link.href = imagemAtual;
        link.click();
    }

    function tirarNovaFoto() {
        botoesAcoes.classList.add("escondido");
        btn.style.display = "inline-block";
        imagemAtual = null;
        statusMsg.style.display = "none";
    }

    // ============================================
    // EVENTOS
    // ============================================
    btn.addEventListener("click", capturarFoto);
    btnBaixar.addEventListener("click", baixarFoto);
    btnWhatsApp.addEventListener("click", compartilharWhatsApp);
    btnCompartilhar.addEventListener("click", compartilharOutros);
    btnNovaFoto.addEventListener("click", tirarNovaFoto);

    // ============================================
    // INICIALIZACAO
    // ============================================
    iniciarCamera();
    atualizarGaleria();
</script>

</body>
